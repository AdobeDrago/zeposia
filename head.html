<script nonce="aem">
// HCP modal dismiss — guaranteed to work even if module scripts fail
document.addEventListener('click', function(e) {
  var btn = e.target;
  while (btn && btn !== document) {
    if (btn.classList && btn.classList.contains('hcp_btn')) {
      var modal = document.getElementById('entryModal');
      if (modal) {
        modal.classList.add('hcp-dismissed');
        modal.style.display = 'none';
      }
      document.body.style.overflow = '';
      try { sessionStorage.setItem('hcp-verified', 'true'); } catch(x) {}
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    btn = btn.parentElement;
  }
});
</script>
